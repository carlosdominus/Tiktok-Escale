<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TiktokEscale | Arsenal de Escala #1</title>
    <link rel="icon" type="image/svg+xml" href="https://img.icons8.com/ios-filled/50/ff1d4d/flash-on.png" />
    <script>
      // Prevent crash if a library tries to overwrite window.fetch
      // which is read-only in some iframe environments.
      (function() {
        try {
          var originalFetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            get: function() { return originalFetch; },
            set: function(v) { console.warn('Blocked attempt to overwrite window.fetch'); },
            configurable: true
          });
        } catch (e) {
          console.warn('Could not redefine window.fetch:', e.message);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
